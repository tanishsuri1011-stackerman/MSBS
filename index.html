<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Ms Szpila!</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
@import url('https://fonts.googleapis.com/css2?family=Handlee&display=swap');

body{
  margin:0;
  font-family:'Handlee', cursive;
  background:#fff8dc;
  text-align:center;
  overflow:hidden;
  position:relative;
}

h1{
  margin-top:25px;
  font-size:42px;
  color:#ff4081;
  text-shadow: 1px 1px #aaa;
}

.controls{
  margin:15px;
}

button{
  font-size:18px;
  padding:12px 20px;
  margin:6px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#ffd740;
  box-shadow:2px 2px 6px #999;
}

#lyrics{
  font-size:24px;
  height:35px;
  margin-top:10px;
}

#piano{
  margin:30px auto;
  display:flex;
  justify-content:center;
  height:150px;
  width:840px;
}

.key{
  width:40px;
  height:150px;
  background:white;
  border:1px solid black;
}

.key.active{
  background:#ffeb3b;
}

.confetti{
  position:absolute;
  width:10px;
  height:10px;
  opacity:0.8;
}

.balloon{
  position:absolute;
  bottom:-120px;
  width:70px;
  height:90px;
  border-radius:50%;
  opacity:0.85;
}

#cake{
  width:200px;
  height:120px;
  background:#ff8a65;
  border-radius:10px;
  margin:30px auto;
  position:relative;
  transition: transform 1s;
}

.candles{
  position:absolute;
  top:-35px;
  width:100%;
  display:flex;
  justify-content:space-around;
}

.candle{
  width:12px;
  height:35px;
  background:white;
  border-radius:3px;
  position:relative;
}

.flame{
  width:12px;
  height:16px;
  background:orange;
  border-radius:50%;
  position:absolute;
  top:-15px;
  animation:flicker 0.2s infinite alternate;
}

@keyframes flicker{
  from{transform:scale(1)}
  to{transform:scale(1.2)}
}

/* FIREWORKS */
.firework{
  position:absolute;
  width:4px;
  height:4px;
  border-radius:50%;
  pointer-events:none;
}
</style>
</head>

<body>

<h1>🎉 Happy Birthday Ms Szpila! 🎉</h1>

<div class="controls">
<button id="play">Sing</button>
<button id="stop">Stop</button>
<button id="replay">Replay</button>
<button id="faster">Faster</button>
<button id="slower">Slower</button>
</div>

<div id="lyrics"></div>

<div id="piano"></div>

<div id="cake">
  <div class="candles">
    <div class="candle"><div class="flame"></div></div>
    <div class="candle"><div class="flame"></div></div>
    <div class="candle"><div class="flame"></div></div>
    <div class="candle"><div class="flame"></div></div>
    <div class="candle"><div class="flame"></div></div>
  </div>
</div>

<script>
// ------------------ MUSIC DATA ------------------
const lyrics=[
"Happy Birthday to you",
"Happy Birthday to you",
"Happy Birthday dear Ms Szpila",
"Happy Birthday to you"
];

const melody=[
264,264,297,264,352,330,
264,264,297,264,396,352,
264,264,528,440,352,330,297,
466,466,440,352,396,352
];

let durations=[
400,400,800,800,800,1600,
400,400,800,800,800,1600,
400,400,800,800,800,800,1600,
400,400,800,800,800,1600
];

// ------------------ AUDIO ENGINE ------------------
let ctx;
let oscillators=[];
let playing=false;
let speed=1;

function sing(){
if(playing) return;
playing=true;

ctx=new (window.AudioContext||window.webkitAudioContext)();
let time=ctx.currentTime;

melody.forEach((freq,i)=>{

[0.98,1,1.02].forEach(v=>{
const osc=ctx.createOscillator();
const gain=ctx.createGain();
osc.frequency.value=freq*v;
osc.type='sine';
gain.gain.value=0.12;
osc.connect(gain);
gain.connect(ctx.destination);
osc.start(time);
osc.stop(time+(durations[i]/speed)/1000);
oscillators.push(osc);
});

highlightKey(freq);

if(i%6===0){
let line=Math.floor(i/6);
setTimeout(()=>{document.getElementById("lyrics").textContent=lyrics[line]||""},(time-ctx.currentTime)*1000);
}

time+=(durations[i]/speed)/1000;
});

// CONFETTI & BALLOONS
confetti();
balloons();

// FIREWORKS AFTER SONG
setTimeout(fireworks, (time-ctx.currentTime)*1000);
setTimeout(blowCandles, (time-ctx.currentTime)*1000);
setTimeout(growCake, (time-ctx.currentTime)*1000);
}

function stop(){
oscillators.forEach(o=>o.stop());
oscillators=[];
if(ctx) ctx.close();
playing=false;
document.getElementById("lyrics").textContent="";
resetCake();
}

// REPLAY
function replay(){stop(); setTimeout(sing,200);}
document.getElementById("play").onclick=sing;
document.getElementById("stop").onclick=stop;
document.getElementById("replay").onclick=replay;

// SPEED
document.getElementById("faster").onclick=()=>{speed*=1.2};
document.getElementById("slower").onclick=()=>{speed/=1.2};

// ------------------ PIANO ------------------
const piano=document.getElementById("piano");
for(let i=0;i<21;i++){
let key=document.createElement("div");
key.className="key";
piano.appendChild(key);
}
function highlightKey(freq){
let index=Math.floor(freq/40)%21;
let key=piano.children[index];
key.classList.add("active");
setTimeout(()=>key.classList.remove("active"),200);
}

// ------------------ CONFETTI ------------------
function confetti(){
for(let i=0;i<70;i++){
let c=document.createElement("div");
c.className="confetti";
c.style.background=`hsl(${Math.random()*360},100%,50%)`;
c.style.left=Math.random()*window.innerWidth+"px";
c.style.top="-10px";
document.body.appendChild(c);
let fall=setInterval(()=>{
let top=parseFloat(c.style.top);
if(top>window.innerHeight){c.remove(); clearInterval(fall);}
else{c.style.top=top+4+"px";}
},20);
}
}

// ------------------ BALLOONS ------------------
function balloons(){
for(let i=0;i<10;i++){
let b=document.createElement("div");
b.className="balloon";
b.style.left=Math.random()*window.innerWidth+"px";
b.style.background=`hsl(${Math.random()*360},80%,60%)`;
document.body.appendChild(b);
let rise=setInterval(()=>{
let bottom=parseFloat(b.style.bottom);
if(bottom>window.innerHeight){b.remove(); clearInterval(rise);}
else{b.style.bottom=(bottom+2)+"px";}
},20);
}
}

// ------------------ CAKE & CANDLES ------------------
const cake=document.getElementById("cake");
function blowCandles(){
document.querySelectorAll(".flame").forEach(f=>f.style.display="none");
}
function growCake(){cake.style.transform="scale(1.5)";}
function resetCake(){cake.style.transform="scale(1)"; document.querySelectorAll(".flame").forEach(f=>f.style.display="block");}

// ------------------ FIREWORKS ------------------
function fireworks(){
for(let i=0;i<50;i++){
let f=document.createElement("div");
f.className="firework";
f.style.background=`hsl(${Math.random()*360},100%,50%)`;
f.style.left=Math.random()*window.innerWidth+"px";
f.style.top=Math.random()*window.innerHeight+"px";
document.body.appendChild(f);
setTimeout(()=>f.remove(),1500);
}
}
</script>
</body>
</html>
